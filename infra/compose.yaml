services:
  postgres:
    image: postgres:16-alpine
    container_name: esco-postgres
    environment:
      POSTGRES_DB: esco
      POSTGRES_USER: esco
      POSTGRES_PASSWORD: esco
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esco -d esco"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: esco-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  postgres-data:
  qdrant-data:
